<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Planify — Google Login Test</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
      font-family: 'Segoe UI', sans-serif;
      color: #fff;
    }

    .card {
      background: rgba(255,255,255,0.07);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 20px;
      padding: 48px 40px;
      width: 100%;
      max-width: 540px;
      box-shadow: 0 24px 60px rgba(0,0,0,0.5);
    }

    .logo {
      font-size: 28px;
      font-weight: 700;
      letter-spacing: -0.5px;
      margin-bottom: 6px;
      background: linear-gradient(90deg, #a78bfa, #60a5fa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .subtitle {
      color: rgba(255,255,255,0.45);
      font-size: 13px;
      margin-bottom: 36px;
    }

    #google-btn-wrapper {
      display: flex;
      justify-content: center;
      margin-bottom: 32px;
    }

    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      color: rgba(255,255,255,0.25);
      font-size: 12px;
      margin-bottom: 24px;
    }
    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: rgba(255,255,255,0.1);
    }

    .token-box {
      display: none;
      flex-direction: column;
      gap: 12px;
    }

    .token-box.visible { display: flex; }

    .user-info {
      display: flex;
      align-items: center;
      gap: 12px;
      background: rgba(167,139,250,0.1);
      border: 1px solid rgba(167,139,250,0.25);
      border-radius: 12px;
      padding: 14px 16px;
    }

    .user-info img {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      border: 2px solid #a78bfa;
    }

    .user-name { font-weight: 600; font-size: 15px; }
    .user-email { font-size: 12px; color: rgba(255,255,255,0.5); margin-top: 2px; }

    label {
      font-size: 12px;
      font-weight: 600;
      color: rgba(255,255,255,0.5);
      text-transform: uppercase;
      letter-spacing: 0.6px;
    }

    textarea {
      width: 100%;
      min-height: 120px;
      background: rgba(0,0,0,0.35);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 10px;
      color: #e0e7ff;
      font-size: 11px;
      font-family: 'Consolas', monospace;
      padding: 12px;
      resize: vertical;
      outline: none;
      line-height: 1.5;
    }

    textarea:focus { border-color: #a78bfa; }

    .actions { display: flex; gap: 10px; }

    button.copy-btn {
      flex: 1;
      padding: 12px;
      background: linear-gradient(135deg, #a78bfa, #60a5fa);
      border: none;
      border-radius: 10px;
      color: #fff;
      font-weight: 700;
      font-size: 14px;
      cursor: pointer;
      transition: opacity 0.2s;
    }

    button.copy-btn:hover { opacity: 0.85; }

    button.swagger-btn {
      flex: 1;
      padding: 12px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 10px;
      color: #fff;
      font-weight: 600;
      font-size: 14px;
      cursor: pointer;
      transition: background 0.2s;
      text-decoration: none;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }

    button.swagger-btn:hover { background: rgba(255,255,255,0.14); }

    .toast {
      position: fixed;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: #22c55e;
      color: #fff;
      padding: 10px 24px;
      border-radius: 100px;
      font-size: 13px;
      font-weight: 600;
      opacity: 0;
      transition: all 0.3s;
      pointer-events: none;
    }
    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    .step-hint {
      background: rgba(96,165,250,0.08);
      border: 1px solid rgba(96,165,250,0.2);
      border-radius: 10px;
      padding: 12px 16px;
      font-size: 12px;
      color: rgba(255,255,255,0.6);
      line-height: 1.7;
    }

    .step-hint strong { color: #60a5fa; }
  </style>
</head>
<body>

<div class="card">
  <div class="logo">🚀 Planify</div>
  <div class="subtitle">Google Login — Test Tool for Swagger</div>

  <div id="google-btn-wrapper">
    <div id="g_id_onload"
         data-client_id="409878280574-mvg07sgaqnadfs57qsm962baicjj63eo.apps.googleusercontent.com"
         data-callback="handleCredentialResponse"
         data-auto_prompt="false">
    </div>
    <div class="g_id_signin"
         data-type="standard"
         data-size="large"
         data-theme="filled_blue"
         data-text="sign_in_with"
         data-shape="pill"
         data-logo_alignment="left"
         data-width="280">
    </div>
  </div>

  <div class="divider">sau khi đăng nhập</div>

  <div class="token-box" id="tokenBox">
    <div class="user-info" id="userInfo">
      <img id="userAvatar" src="" alt="avatar"/>
      <div>
        <div class="user-name" id="userName"></div>
        <div class="user-email" id="userEmail"></div>
      </div>
    </div>

    <label>Google ID Token (paste vào Swagger)</label>
    <textarea id="tokenArea" readonly></textarea>

    <div class="actions">
      <button class="copy-btn" onclick="copyToken()">📋 Copy Token</button>
      <button class="swagger-btn" onclick="openSwagger()">
        🔗 Mở Swagger
      </button>
    </div>
  </div>

  <div class="step-hint" id="stepHint">
    <strong>Hướng dẫn:</strong><br>
    1. Nhấn <em>Sign in with Google</em> bên trên<br>
    2. Copy ID Token được sinh ra<br>
    3. Mở Swagger → <code>POST /api/auth/google-login</code><br>
    4. Paste token vào field <code>idToken</code> → Execute
  </div>
</div>

<div class="toast" id="toast">✅ Đã copy vào clipboard!</div>

<script src="https://accounts.google.com/gsi/client" async defer></script>
<script>
  function handleCredentialResponse(response) {
    const idToken = response.credential;

    // Decode JWT payload (không cần verify ở đây — chỉ để hiển thị)
    const parts = idToken.split('.');
    const payload = JSON.parse(atob(parts[1].replace(/-/g, '+').replace(/_/g, '/')));

    // Hiển thị thông tin user
    document.getElementById('userAvatar').src = payload.picture || '';
    document.getElementById('userName').textContent = payload.name || '';
    document.getElementById('userEmail').textContent = payload.email || '';
    document.getElementById('tokenArea').value = idToken;

    // Show token box
    document.getElementById('tokenBox').classList.add('visible');
    document.getElementById('stepHint').style.display = 'none';
    document.getElementById('google-btn-wrapper').style.display = 'none';
  }

  function copyToken() {
    const token = document.getElementById('tokenArea').value;
    navigator.clipboard.writeText(token).then(() => {
      const toast = document.getElementById('toast');
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 2500);
    });
  }

  function openSwagger() {
    window.open('http://localhost:5240/swagger', '_blank');
  }
</script>

</body>
</html>
